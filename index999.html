<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُسلم العطوي | متخصص تقنية معلومات</title>
    <style>
        :root {
            --primary-color: #001f3f; /* كحلي */
            --accent-color: #d4af37;  /* ذهبي */
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: var(--primary-color);
            color: white;
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border-bottom: 8px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            background-color: #eee;
            margin-bottom: 15px;
        }
        h1 { margin: 10px 0; font-size: 24px; color: var(--accent-color); }
        p { font-size: 16px; margin-bottom: 25px; opacity: 0.9; }
        
        .links-container { display: flex; flex-direction: column; gap: 15px; }
        
        .link-btn {
            background-color: white;
            color: var(--primary-color);
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            display: block;
        }
        .link-btn:hover {
            background-color: var(--accent-color);
            color: white;
            transform: translateY(-3px);
        }
        .footer-text { font-size: 12px; margin-top: 30px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div style="font-size: 50px; margin-bottom: 10px;">💻</div>
        
        <h1>مُسلم العطوي</h1>
        <p>متخصص تقنية معلومات | محلل بيانات</p>

        <div class="links-container">
            <a href="https://wa.me/966504219939" class="link-btn" target="_blank">تواصل عبر واتساب</a>
            <a href="https://linkedin.com/in/YourProfile" class="link-btn" target="_blank">حسابي في لينكد إن</a>
            <a href="mailto:your-m.m.945@hotmail.com" class="link-btn">مراسلتي عبر الإيميل</a>
            <a href="https://amam945945-cloud.github.io/hlil2026/" class="link-btn" style="border: 1px solid var(--accent-color);">مشروع المسبحة الإلكترونية</a>
        </div>

        <p class="footer-text">حقوق النشر محفوظة © 2026</p>
    </div>

</body>
</html>
